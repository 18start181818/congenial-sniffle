            z-index: -100;

                    desc: '你有野心，喜欢挑战，善于说服别人。你不甘平庸，渴望影响他人，适合做带销售性质的事情。',
                    directions: [
                        '带货类：小红书买手、直播带货、好物分享、团购团长',
                        '销售类：代理、分销、保险/房产经纪、课程推广',
                        '创业类：小项目试水、资源整合、二手倒卖、信息差套利',
                        '培训类：销售技巧培训、口才训练、演讲辅导',
                        '招商类：地推、渠道拓展、商务谈判',
                        '个人IP：打造行业专家人设，知识付费变现'
                    ],
                    advice: '📌 起步建议：先从闲鱼卖闲置开始，练手感。把你的“会说话”变现，做你熟悉领域的带货，用“测评+种草”的方式在小红书积累信任。',
                    books: [
                        { title: '《影响力》', author: '罗伯特·西奥迪尼', desc: '说服力的六大原则，让人无法对你说不。' },
                        { title: '《疯传》', author: '乔纳·伯杰', desc: '让你的产品和思想像病毒一样传播。' },
                        { title: '《从0到1》', author: '彼得·蒂尔', desc: '垄断思维，教你做有壁垒的生意。' },
                        { title: '《销售洗脑》', author: '哈里·弗里德曼', desc: '洞察顾客心理，把任何东西卖给任何人。' },
                        { title: '《弱传播》', author: '邹振东', desc: '小众但颠覆，舆论世界的生存法则。' }
                    ],
                    quote: '“人们买的不是产品，而是对更好的自己的向往。” —— 乔纳·伯杰《疯传》'
                },
                'C': {
                    title: '常规型 · 执行细致',
                    desc: '你做事有条理，喜欢按规矩来，适合做需要耐心和细心的事情。你是大家眼中的“靠谱”人选。',
                    directions: [
                        '技能接单：Excel/PPT制作、数据录入、文档整理、排版',
                        '代运营：小红书/公众号排版、社群日常维护、后台管理',
                        '整理收纳：上门整理、衣橱整理、空间规划、搬家打包',
                        '行政外包：会议记录、行程安排、邮件处理、档案管理',
                        '校对/审核：文章校对、合同审查、数据质检',
                        '时间管理服务：日程规划、代办提醒、习惯监督'
                    ],
                    advice: '📌 起步建议：把你的“靠谱”变成产品，去猪八戒/闲鱼挂单接活，从19.9元的小单开始积累口碑。做标准化服务包（比如“小红书排版套餐月卡”），提高复购。',
                    books: [
                        { title: '《搞定》', author: '戴维·艾伦', desc: 'GTD时间管理经典，让执行变得从容。' },
                        { title: '《断舍离》', author: '山下英子', desc: '收纳不仅是整理物品，更是整理人生。' },
                        { title: '《清单革命》', author: '阿图·葛文德', desc: '用清单避免错误，让复杂工作变简单。' },
                        { title: '《极简工作》', author: '约根·库尔兹', desc: '德国效率专家的高效办公法则。' },
                        { title: '《整理情绪的力量》', author: '有川真由美', desc: '不仅整理房间，还要整理心情。' }
                    ],
                    quote: '“秩序是天才的仆人，也是常人的救生圈。” —— 约根·库尔兹《极简工作》'
                }
            };

            const compoundAdvice = {
                'R+A': '手作教学、DIY体验课、手工材料包',
                'I+E': '商业分析、行业咨询、创业顾问',
                'A+S': '艺术疗愈、绘画心理、情感插画',
                'S+E': '社群团长、资源对接、活动主办',
                'C+A': '排版设计、PPT美化、手账模板',
                'R+I': '产品测评、科技DIY、手工教程'
            };

            let currentScreen = 'welcome';
            let currentQIndex = 0;
            let answers = new Array(30).fill(null);
            let currentResultDim = 'R';
            let currentResultDetail = null;

            const contentDiv = document.getElementById('mainContent');
            const posterArea = document.getElementById('poster-capture-area');

            function render() {
                if (currentScreen === 'welcome') renderWelcome();
                else if (currentScreen === 'question') renderQuestion();
                else if (currentScreen === 'result') renderResult();
            }

            function renderWelcome() {
                let html = `
                    <div class="welcome-screen">
                        <div class="welcome-title">🔮 30道题，测出你最赚钱的副业方向</div>
                        <div class="welcome-sub">很多人想做副业却不知道从哪入手。其实不是你能力不行，而是你的天赋没被挖掘。</div>
                        <div class="desc-box">
                            <p>📋 本测试改编自权威的霍兰德职业倾向测验，共30题。</p>
                            <p>⚡ 凭第一感觉选择，不要反复斟酌。</p>
                            <p style="margin-bottom:0">💡 每题请选择最符合你实际情况的选项</p>
                        </div>
                        <button class="btn-start" id="startTestBtn">开始测试</button>
                        <div style="height: 10px;"></div>
                    </div>
                `;
                contentDiv.innerHTML = html;
                document.getElementById('startTestBtn')?.addEventListener('click', () => {
                    currentScreen = 'question';
                    currentQIndex = 0;
                    answers.fill(null);
                    render();
                });
            }

            function renderQuestion() {
                if (currentQIndex >= questions.length) {
                    calculateAndShowResult();
                    return;
                }
                const q = questions[currentQIndex];
                const selectedVal = answers[currentQIndex];
                const progress = ((currentQIndex) / questions.length) * 100;

                // 选项顺序：非常同意(5) -> 同意(4) -> 中立(3) -> 不同意(2) -> 非常不同意(1)
                const opts = ['非常同意', '同意', '中立', '不同意', '非常不同意'];
                const vals = [5,4,3,2,1];
                let optionsHtml = '';
                for (let i=0; i<opts.length; i++) {
                    const selectedClass = (selectedVal === vals[i]) ? 'selected' : '';
                    optionsHtml += `
                        <div class="option-item ${selectedClass}" data-val="${vals[i]}">
                            <span class="option-label">${opts[i]}</span>
                        </div>
                    `;
                }

                let html = `
                    <div class="question-screen">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%;"></div>
                        </div>
                        <div class="question-card">
                            <div class="q-num">
                                <span>第 ${currentQIndex+1}/${questions.length} 题</span>
                            </div>
                            <div class="q-text">${q}</div>
                            <div class="options-grid" id="optionsContainer">
                                ${optionsHtml}
                            </div>
                            <div class="nav-buttons">
                                ${currentQIndex > 0 ? '<button class="nav-btn" id="prevBtn">← 上一题</button>' : '<div></div>'}
                                ${currentQIndex < questions.length-1 ? 
                                    '<button class="nav-btn primary" id="nextBtn">下一题 →</button>' : 
                                    '<button class="nav-btn primary" id="submitBtn">提交 查看结果</button>'}
                            </div>
                        </div>
                    </div>
                `;
                contentDiv.innerHTML = html;

                document.querySelectorAll('.option-item').forEach(opt => {
                    opt.addEventListener('click', (e) => {
                        const val = parseInt(opt.dataset.val, 10);
                        answers[currentQIndex] = val;
                        document.querySelectorAll('.option-item').forEach(o => o.classList.remove('selected'));
                        opt.classList.add('selected');
                        setTimeout(() => {
                            if (currentQIndex < questions.length - 1) {
                                currentQIndex++;
                                render();
                            }
                        }, 200);
                    });
                });

                document.getElementById('prevBtn')?.addEventListener('click', () => {
                    if (currentQIndex > 0) {
                        currentQIndex--;
                        render();
                    }
                });
                document.getElementById('nextBtn')?.addEventListener('click', () => {
                    if (answers[currentQIndex] === null) {
                        alert('请先选择本题的选项');
                        return;
                    }
                    if (currentQIndex < questions.length-1) {
                        currentQIndex++;
                        render();
                    }
                });
                document.getElementById('submitBtn')?.addEventListener('click', () => {
                    if (answers[currentQIndex] === null) {
                        alert('请先选择本题的选项');
                        return;
                    }
                    calculateAndShowResult();
                });
            }

            function calculateAndShowResult() {
                const dimScore = { 'R':0, 'I':0, 'A':0, 'S':0, 'E':0, 'C':0 };
                for (let i=0; i<answers.length; i++) {
                    if (answers[i] !== null) {
                        dimScore[dimMap[i]] += answers[i];
                    }
                }
                let maxDim = 'R';
                let maxScore = dimScore['R'];
                for (let d in dimScore) {
                    if (dimScore[d] > maxScore) {
                        maxScore = dimScore[d];
                        maxDim = d;
                    }
                }
                let closeDims = [];
                for (let d in dimScore) {
                    if (Math.abs(dimScore[d] - maxScore) <= 3) closeDims.push(d);
                }
                closeDims.sort((a,b) => dimScore[b] - dimScore[a]);
                const primary = closeDims[0];
                const secondary = closeDims.length > 1 ? closeDims[1] : null;
                
                currentResultDim = primary;
                currentResultDetail = resultDetails[primary] || resultDetails['R'];

                let compoundText = '';
                if (secondary && primary !== secondary) {
                    const key1 = primary+'+'+secondary;
                    const key2 = secondary+'+'+primary;
                    if (compoundAdvice[key1]) compoundText = `✨ 复合推荐：${compoundAdvice[key1]}`;
                    else if (compoundAdvice[key2]) compoundText = `✨ 复合推荐：${compoundAdvice[key2]}`;
                }

                // 生成书单HTML
                let booksHtml = '';
                currentResultDetail.books.forEach(book => {
                    booksHtml += `
                        <div class="book-item">
                            <div class="book-title">📖 ${book.title} - ${book.author}</div>
                            <div class="book-desc">${book.desc}</div>
                        </div>
                    `;
                });

                let dirList = currentResultDetail.directions.map(d => `<li>🔹 ${d}</li>`).join('');

                let html = `
                    <div class="result-screen">
                        <div class="result-badge">
                            <div class="result-type">${primary}</div>
                            <div class="result-title">${currentResultDetail.title}</div>
                        </div>
                        <div class="result-desc-box">
                            <h3>🧠 你的天赋解析</h3>
                            <p style="margin-bottom: 20px;">${currentResultDetail.desc}</p>
                            
                            <h3>🚀 适合副业方向（6个）</h3>
                            <ul class="direction-list">${dirList}</ul>
                            
                            <h3>💡 起步建议</h3>
                            <p style="background: #f6f3ff; padding: 16px; border-radius: 20px;">${currentResultDetail.advice}</p>
                            
                            ${compoundText ? '<p style="margin-top:16px;background:#efeaff;padding:12px;border-radius:20px;">'+compoundText+'</p>' : ''}
                            
                            <h3>📚 专属书单（5本）</h3>
                            <div class="book-list">${booksHtml}</div>
                            
                            <h3>✨ 专属金句</h3>
                            <div class="quote-box">“${currentResultDetail.quote}”</div>
                        </div>
                        
                        <div class="btn-group">
                            <button class="btn-secondary" id="retestBtn">🔄 重新测试</button>
                            <button class="btn-share" id="sharePosterBtn">📸 生成海报</button>
                        </div>
                        <div class="disclaimer">
                            ⚠️ 免责声明：本测试结果仅供参考，旨在启发自我探索。每个人的天赋都是独特的，请结合自身实际情况理性选择。
                        </div>
                    </div>
                `;
                contentDiv.innerHTML = html;
                currentScreen = 'result';

                document.getElementById('retestBtn')?.addEventListener('click', ()=>{
                    currentScreen = 'welcome';
                    answers.fill(null);
                    render();
                });

                document.getElementById('sharePosterBtn')?.addEventListener('click', generatePoster);
            }

            // 生成海报并保存
            async function generatePoster() {
                const primary = currentResultDim;
                const detail = currentResultDetail;
                
                // 构建海报HTML
                const posterHtml = `
                    <div style="background: white; width: 340px; padding: 24px; border-radius: 32px; font-family: system-ui; box-shadow: 0 20px 40px rgba(0,0,0,0.2);">
                        <div style="text-align: center; margin-bottom: 16px;">
                            <span style="background: #6c4eff10; padding: 8px 20px; border-radius: 40px; color: #6c4eff; font-weight: 600;">⭐ 星测Star-t · 天赋挖掘 ⭐</span>
                        </div>
                        <div style="background: linear-gradient(145deg, #f1ecff, #ffffff); border-radius: 28px; padding: 24px; text-align: center;">
                            <div style="font-size: 48px; font-weight: 800; color: #3a1f6a;">${primary}</div>
                            <div style="font-size: 24px; font-weight: 700; color: #2d1b4e; margin: 8px 0;">${detail.title}</div>
                            <div style="height: 2px; width: 60px; background: #6c4eff; margin: 16px auto;"></div>
                            <div style="font-size: 16px; color: #4a3a6a; text-align: left; margin: 16px 0;">
                                <p style="font-weight: 600; margin-bottom: 8px;">🚀 适合副业：</p>
                                <ul style="padding-left: 20px; margin: 8px 0;">
                                    ${detail.directions.slice(0, 3).map(d => `<li style="margin-bottom: 6px;">🔹 ${d}</li>`).join('')}
                                </ul>
                                <p style="font-weight: 600; margin: 12px 0 8px;">📚 推荐阅读：</p>
                                ${detail.books.slice(0, 2).map(b => `<div style="margin-bottom: 6px; font-size: 14px;">· ${b.title} (${b.author})</div>`).join('')}
                            </div>
                            <div style="font-style: italic; color: #6f5ea0; font-size: 14px; padding: 12px; background: #f8f5ff; border-radius: 16px; margin-top: 12px;">
                                “${detail.quote}”
                            </div>
                        </div>
                        <div style="text-align: center; margin-top: 16px; font-size: 12px; color: #a294c0;">
                            ✨ 扫码测你的隐藏天赋 · 星测Star-t
                        </div>
                    </div>
                `;

                posterArea.innerHTML = posterHtml;
                const element = posterArea.firstElementChild;
                
                try {
                    const canvas = await html2canvas(element, {
                        scale: 2,
                        backgroundColor: '#ffffff',
                        logging: false,
                        allowTaint: false,
                        useCORS: true
                    });
                    
                    // 创建下载链接
                    const link = document.createElement('a');
                    link.download = `星测Star-t_${primary}天赋.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    
                    // 清理
                    posterArea.innerHTML = '';
                } catch (error) {
                    alert('海报生成失败，请重试');
                    console.error(error);
                }
            }

            render();
        })();
    </script>
</body>
